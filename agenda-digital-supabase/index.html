<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Digital</title>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Font Awesome (ícones) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Cabeçalho -->
        <header>
            <h1><i class="fas fa-address-book"></i> Agenda Digital</h1>
            <p>Gerencie seus contatos na nuvem com Supabase</p>
        </header>

        <!-- Barra de Busca e Novo Contato -->
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar contato por nome...">
                <button id="searchBtn"><i class="fas fa-search"></i> Buscar</button>
                <button id="clearSearchBtn"><i class="fas fa-times"></i> Limpar</button>
            </div>
            <button id="newContactBtn" class="btn-new">
                <i class="fas fa-plus"></i> Novo Contato
            </button>
        </div>

        <!-- Formulário de Cadastro/Edição -->
        <div id="formContainer" class="form-container hidden">
            <h2 id="formTitle"><i class="fas fa-user-plus"></i> Novo Contato</h2>
            <form id="contactForm">
                <input type="hidden" id="contactId">
                
                <div class="form-group">
                    <label for="nome"><i class="fas fa-user"></i> Nome *</label>
                    <input type="text" id="nome" placeholder="Digite o nome completo" required>
                </div>
                
                <div class="form-group">
                    <label for="telefone"><i class="fas fa-phone"></i> Telefone</label>
                    <input type="tel" id="telefone" placeholder="(11) 99999-9999">
                </div>
                
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> E-mail</label>
                    <input type="email" id="email" placeholder="email@exemplo.com">
                </div>

                <div class="form-group">
                    <label for="obs"><i class="fas fa-comment"></i> Observações</label>
                    <textarea id="obs" placeholder="Observações adicionais..." rows="2"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" id="saveBtn" class="btn-save">
                        <i class="fas fa-save"></i> Salvar
                    </button>
                    <button type="button" id="cancelBtn" class="btn-cancel">
                        <i class="fas fa-times"></i> Cancelar
                    </button>
                </div>
            </form>
        </div>

        <!-- Tabela de Contatos -->
        <div class="table-container">
            <div class="table-header">
                <h3><i class="fas fa-list"></i> Lista de Contatos</h3>
                <span id="totalContatos">0 contatos</span>
            </div>
            
            <div id="loadingSpinner" class="loading hidden">
                <i class="fas fa-spinner fa-spin"></i> Carregando...
            </div>
            
            <div id="tableWrapper">
                <table id="contactsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nome</th>
                            <th>Telefone</th>
                            <th>E-mail</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="contactsBody">
                        <!-- Contatos serão inseridos aqui via JavaScript -->
                    </tbody>
                </table>
            </div>
            
            <div id="emptyMessage" class="empty-message">
                <i class="fas fa-inbox"></i>
                <p>Nenhum contato cadastrado.</p>
                <p class="sub-text">Clique em "Novo Contato" para começar!</p>
            </div>
        </div>

        <!-- Rodapé -->
        <footer>
            <p>Desenvolvido com <i class="fas fa-heart" style="color: #e74c3c;"></i> e Supabase</p>
        </footer>
    </div>

    <!-- JavaScript -->
    <script src="script.js"></script>
</body>
</html>
